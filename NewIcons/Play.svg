<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#0080ff; stop-opacity:1" />
      <stop offset="60%" style="stop-color:#002b5c; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a33; stop-opacity:1" />
    </radialGradient>

    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff; stop-opacity:0" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="100" cy="100" r="98" fill="none" stroke="#005ab5" stroke-width="2" />

  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />

  <path d="M10,100 A90,90 0 0,1 190,100 L10,100 Z" fill="url(#gloss)" opacity="0.4" />

  <path d="M75,65 L140,100 L75,135 Z" fill="#000000" filter="url(#glow)" />
  <path d="M75,65 L140,100 L75,135 Z" fill="#000000" />
</svg>

